# Aiven Apps manifest — deploy via Console → Deploy app → Scan (no agent required).
#
# Aiven auto-provisions + wires the app + Kafka + PostgreSQL from image/depends_on,
# and injects connection env vars automatically:
#   Kafka:    KAFKA_BOOTSTRAP_SERVER, KAFKA_CA_CERT, KAFKA_ACCESS_CERT, KAFKA_ACCESS_KEY
#             (the container entrypoint converts those PEM values into a keystore/truststore)
#   Postgres: DATABASE_URL (postgres://...:...@host:port/db?sslmode=require) + PROJECT_CA_CERT
#
# NOT expressible in this compose manifest (separate provisioning steps — run the
# wiring notebook `./demo-notebook.sh` or see scripts/provision-aiven.md):
#   a dedicated Kafka Connect service, Karapace schema registry, the JDBC sink connector.
#
# Secrets (LICENSE_*, AIVEN_TOKEN, SCHEMA_REGISTRY_PASSWORD) should be set as SECRET
# environment variables in the Console deploy flow — do NOT hard-code them here.
services:
  demo-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - postgres
    environment:
      # Kafka certs + Postgres DATABASE_URL auto-injected by the integrations.
      # Schema registry (Karapace) URL + creds — set at deploy from the Kafka
      # service connection info (Avro producing + JDBC sink need these).
      - SCHEMA_REGISTRY_URL
      - SCHEMA_REGISTRY_USER
      - SCHEMA_REGISTRY_PASSWORD
      # ShadowTraffic license (all secret; set at deploy)
      - LICENSE_ID
      - LICENSE_EMAIL
      - LICENSE_ORGANIZATION
      - LICENSE_EDITION
      - LICENSE_EXPIRATION
      - LICENSE_SIGNATURE
      # Watchdog teardown (AIVEN_TOKEN is secret). List the app service LAST in
      # AIVEN_SERVICES so it deletes the data services before deleting itself, e.g.
      # "<kafka>,<kafka-connect>,<postgres>,<app>".
      - AIVEN_TOKEN
      - AIVEN_PROJECT
      - AIVEN_SERVICES

  # Aiven-managed Kafka (auto-detected from the image name).
  kafka:
    image: apache/kafka:3.9

  # Aiven-managed PostgreSQL (auto-detected from the image name).
  postgres:
    image: postgres:16
